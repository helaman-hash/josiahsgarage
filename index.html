<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Garage Door App</title>

    <style>
        :root {
            --door-duration: 10s;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            /* Outdoor nature background */
            background: linear-gradient(to bottom, #b3e5fc 0%, #e0f2f1 50%, #a5d6a7 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Secret Settings Hotspot (Top Right - Hold for 3s) */
        .settings-hotspot {
            position: absolute;
            top: 0;
            right: 0;
            width: 70px;
            height: 70px;
            background: transparent;
            z-index: 1000;
        }

        /* Overall Garage Scene Wrapper */
        .scene-wrapper {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 20px;
            width: 95vw;
            max-width: 800px;
            padding: 20px;
        }

        /* Side Control Columns */
        .control-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100px;
            margin-bottom: 20px;
        }

        /* Signage holding the arrows */
        .sign {
            width: 80px;
            height: 100px;
            background: #2e2e2e;
            border: 4px solid #1a1a1a;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .sign::after {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px dashed #555;
            border-radius: 4px;
            pointer-events: none;
        }

        /* Arrow Styling */
        .arrow-svg {
            width: 50px;
            height: 50px;
            fill: #444; /* Default dim/off color */
            transition: fill 0.3s, filter 0.3s;
        }

        /* Active/Glowing state for the arrows */
        .arrow-active {
            fill: #ffeb3b; /* Glowing yellow */
            filter: drop-shadow(0 0 8px #ffeb3b);
        }

        .arrow-pulsing {
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.5; }
            to { opacity: 1; filter: drop-shadow(0 0 12px #ffeb3b); }
        }

        /* Push Buttons */
        .round-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 6px solid #1a1a1a;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 0 #111, 0 10px 15px rgba(0,0,0,0.4);
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            outline: none;
        }

        .round-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #111, 0 5px 10px rgba(0,0,0,0.4);
        }

        /* Disabled / Locked Out State */
        .round-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: translateY(2px);
            box-shadow: 0 6px 0 #111, 0 8px 10px rgba(0,0,0,0.2);
        }

        .btn-open {
            background: radial-gradient(circle, #e53935 0%, #b71c1c 100%); /* Red Open */
        }
        .btn-close {
            background: radial-gradient(circle, #43a047 0%, #1b5e20 100%); /* Green Close */
        }

        /* The Detached Garage Structure */
        .garage-building {
            flex-grow: 1;
            max-width: 480px;
            background: #a1887f; /* Wood siding color */
            border: 12px solid #5d4037; /* Heavy wood trim */
            border-bottom: 16px solid #3e2723; /* Foundation */
            border-radius: 12px 12px 0 0;
            position: relative;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        /* Wood panel lines on the siding */
        .garage-building::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 100% 20px;
            pointer-events: none;
        }

        /* Overhanging Roof */
        .roof {
            position: absolute;
            top: -28px;
            left: -20px;
            right: -20px;
            height: 20px;
            background: #3e2723;
            border-bottom: 8px solid #271510;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        /* Garage Door Frame */
        .door-frame {
            margin: 25px 15px 0 15px;
            height: 45vh;
            max-height: 320px;
            background: #2e2e2e; /* Shadowy interior */
            border: 8px solid #4e342e; /* Frame trim */
            border-bottom: none;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.8);
        }

        /* Interior Surprise Car */
        .interior-car {
            position: absolute;
            bottom: 5px;
            width: 75%;
            height: auto;
        }
        .interior-car svg {
            width: 100%;
            max-height: 120px;
        }

        /* Wooden Roller Door */
        .garage-door {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #d7ccc8;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform var(--door-duration) linear;
            transform: translateY(0%);
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* Textured wood slats */
        .slat {
            flex-grow: 1;
            border-bottom: 4px solid #5d4037;
            border-top: 1px solid #efebe9;
            background: linear-gradient(to bottom, #bcaaa4, #8d6e63);
            position: relative;
        }

        /* Handle on the bottom slat */
        .slat:last-child::after {
            content: '';
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 8px;
            background: #3e2723;
            border-radius: 4px;
        }

        /* Door Open State */
        .garage-door.open {
            transform: translateY(-93%);
        }

        /* Settings Modal styling */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .modal-content h3 { margin-top: 0; color: #3e2723; }
        .modal-content input[type="range"] {
            width: 100%;
            margin: 15px 0 25px 0;
            accent-color: #5d4037;
        }
        .close-btn {
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            border: none;
            background: #5d4037;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* Simple switch toggles */
        .toggle-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-toggle {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 34px;
        }
        .slider-toggle:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider-toggle { background-color: #5d4037; }
        input:checked + .slider-toggle:before { transform: translateX(24px); }
    </style>
</head>
<body>

    <!-- Invisible Settings Trigger (Hold 3 Seconds) -->
    <div class="settings-hotspot" id="settingsHotspot"></div>

    <!-- Main App Container -->
    <div class="scene-wrapper">
        
        <!-- Left Side: OPEN controls -->
        <div class="control-column">
            <div class="sign">
                <!-- Up Arrow -->
                <svg class="arrow-svg arrow-active" id="upArrow" viewBox="0 0 24 24">
                    <path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/>
                </svg>
            </div>
            <button class="round-btn btn-open" id="openBtn">OPEN</button>
        </div>

        <!-- Center: Wooden Garage Structure -->
        <div class="garage-building">
            <div class="roof"></div>
            
            <div class="door-frame">
                <!-- Surprise yellow car inside -->
                <div class="interior-car">
                    <svg viewBox="0 0 100 60">
                        <g fill="#FFD54F">
                            <path d="M15 35 C15 25, 30 20, 50 20 C70 20, 85 25, 85 35 L88 45 C88 48, 80 48, 80 48 L20 48 C20 48, 12 48, 12 45 Z" />
                            <rect x="25" y="45" width="12" height="10" rx="3" fill="#333"/>
                            <rect x="63" y="45" width="12" height="10" rx="3" fill="#333"/>
                            <circle cx="25" cy="35" r="5" fill="#FFF"/>
                            <circle cx="25" cy="35" r="2" fill="#333"/>
                            <circle cx="75" cy="35" r="5" fill="#FFF"/>
                            <circle cx="75" cy="35" r="2" fill="#333"/>
                            <path d="M40 42 Q50 46 60 42" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
                        </g>
                    </svg>
                </div>

                <!-- Slatted garage door -->
                <div class="garage-door" id="door">
                    <div class="slat"></div><div class="slat"></div><div class="slat"></div><div class="slat"></div>
                    <div class="slat"></div><div class="slat"></div><div class="slat"></div><div class="slat"></div>
                </div>
            </div>
        </div>

        <!-- Right Side: CLOSE controls -->
        <div class="control-column">
            <div class="sign">
                <!-- Down Arrow -->
                <svg class="arrow-svg" id="downArrow" viewBox="0 0 24 24">
                    <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/>
                </svg>
            </div>
            <button class="round-btn btn-close" id="closeBtn" disabled>CLOSE</button>
        </div>

    </div>

    <!-- Hidden Parental Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h3>App Settings</h3>
            
            <div class="toggle-group">
                <span>Sensory Sound & Haptics</span>
                <label class="switch">
                    <input type="checkbox" id="sensoryToggle" checked>
                    <span class="slider-toggle"></span>
                </label>
            </div>

            <label for="speedRange">Travel Time: <span id="speedVal">10</span> seconds</label>
            <input type="range" id="speedRange" min="3" max="25" value="10">
            
            <button class="close-btn" id="closeSettings">Save & Close</button>
        </div>
    </div>

    <script>
        const door = document.getElementById('door');
        const openBtn = document.getElementById('openBtn');
        const closeBtn = document.getElementById('closeBtn');
        const upArrow = document.getElementById('upArrow');
        const downArrow = document.getElementById('downArrow');
        
        const settingsHotspot = document.getElementById('settingsHotspot');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettings = document.getElementById('closeSettings');
        const speedRange = document.getElementById('speedRange');
        const speedVal = document.getElementById('speedVal');
        const sensoryToggle = document.getElementById('sensoryToggle');

        let isOpen = false;
        let isMoving = false;
        let transitionTimeout;

        // Sensory config
        let sensoryEffects = true;
        let audioCtx = null;
        let motorOsc = null;
        let gainNode = null;
        let hapticRumble = null;

        // --- SENSORY CONTROL (Audio & Vibration) ---
        function startSensory() {
            if (!sensoryEffects) return;

            // 1. Synth sound
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                motorOsc = audioCtx.createOscillator();
                motorOsc.type = 'triangle';
                motorOsc.frequency.setValueAtTime(55, audioCtx.currentTime); // Realistic low motor hum

                gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(0.01, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.5); // Fade in

                motorOsc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                motorOsc.start();
            } catch (e) { console.log("Audio failed", e); }

            // 2. Vibration
            if ('vibrate' in navigator) {
                hapticRumble = setInterval(() => {
                    navigator.vibrate(80);
                }, 100);
            }
        }

        function stopSensory(impact = true) {
            // Stop sound
            if (gainNode && audioCtx && motorOsc) {
                const now = audioCtx.currentTime;
                gainNode.gain.setValueAtTime(gainNode.gain.value, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2);

                if (impact && sensoryEffects) {
                    setTimeout(() => {
                        try {
                            const thunk = audioCtx.createOscillator();
                            const thunkGain = audioCtx.createGain();
                            thunk.type = 'sine';
                            thunk.frequency.setValueAtTime(80, audioCtx.currentTime);
                            thunk.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.15);
                            thunkGain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                            thunkGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                            thunk.connect(thunkGain);
                            thunkGain.connect(audioCtx.destination);
                            thunk.start(); thunk.stop(audioCtx.currentTime + 0.2);
                        } catch (e) {}
                    }, 100);
                }
                setTimeout(() => { 
                    if(motorOsc) { motorOsc.stop(); motorOsc.disconnect(); motorOsc = null; }
                }, 250);
            }

            // Stop vibration
            if (hapticRumble) clearInterval(hapticRumble);
            if (impact && sensoryEffects && 'vibrate' in navigator) {
                navigator.vibrate([150, 50, 100]); // Dual impact shock
            } else if ('vibrate' in navigator) {
                navigator.vibrate(0);
            }
        }

        // --- BUTTON HANDLING & DOOR SEQUENCING ---
        function raiseDoor() {
            if (isMoving || isOpen) return;
            
            isMoving = true;
            // Disable BOTH buttons instantly
            openBtn.disabled = true;
            closeBtn.disabled = true;

            // Set up active arrow state (pulsing)
            upArrow.classList.add('arrow-active', 'arrow-pulsing');
            downArrow.classList.remove('arrow-active', 'arrow-pulsing');

            startSensory();
            door.classList.add('open');

            const duration = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--door-duration')) * 1000;

            transitionTimeout = setTimeout(() => {
                isOpen = true;
                isMoving = false;
                stopSensory(true);
                
                // Set final visual states
                upArrow.classList.remove('arrow-active', 'arrow-pulsing');
                downArrow.classList.add('arrow-active'); // Down arrow glows yellow to invite close
                
                // Enable only the close button
                openBtn.disabled = true;
                closeBtn.disabled = false;
            }, duration);
        }

        function lowerDoor() {
            if (isMoving || !isOpen) return;

            isMoving = true;
            // Disable BOTH buttons instantly
            openBtn.disabled = true;
            closeBtn.disabled = true;

            // Set up active arrow state (pulsing)
            downArrow.classList.add('arrow-active', 'arrow-pulsing');
            upArrow.classList.remove('arrow-active', 'arrow-pulsing');

            startSensory();
            door.classList.remove('open');

            const duration = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--door-duration')) * 1000;

            transitionTimeout = setTimeout(() => {
                isOpen = false;
                isMoving = false;
                stopSensory(true);

                // Set final visual states
                downArrow.classList.remove('arrow-active', 'arrow-pulsing');
                upArrow.classList.add('arrow-active'); // Up arrow glows yellow to invite open

                // Enable only the open button
                openBtn.disabled = false;
                closeBtn.disabled = true;
            }, duration);
        }

        openBtn.addEventListener('click', raiseDoor);
        closeBtn.addEventListener('click', lowerDoor);

        // --- MOBILE TACTILE SAFEGUARDS ---
        document.addEventListener('touchmove', (e) => {
            if (!settingsModal.contains(e.target)) e.preventDefault();
        }, { passive: false });

        // --- HIDDEN SETTINGS MODAL (3s Long Press) ---
        let pressTimer;
        function cancelPress() { clearTimeout(pressTimer); }
        function startPress() { pressTimer = setTimeout(() => settingsModal.style.display = 'flex', 3000); }

        settingsHotspot.addEventListener('touchstart', startPress, { passive: true });
        settingsHotspot.addEventListener('touchend', cancelPress);
        settingsHotspot.addEventListener('mousedown', startPress);
        settingsHotspot.addEventListener('mouseup', cancelPress);

        sensoryToggle.addEventListener('change', (e) => {
            sensoryEffects = e.target.checked;
        });

        speedRange.addEventListener('input', (e) => {
            const val = e.target.value;
            speedVal.textContent = val;
            document.documentElement.style.setProperty('--door-duration', `${val}s`);
        });

        closeSettings.addEventListener('click', () => settingsModal.style.display = 'none');

        // --- SERVICE WORKER FOR OFFLINE CACHING ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    const CACHE = 'garage-door-v3';
                    const urls = [ './', './index.html' ];
                    self.addEventListener('install', event => {
                        event.waitUntil(caches.open(CACHE).then(cache => cache.addAll(urls)));
                    });
                    self.addEventListener('fetch', event => {
                        event.respondWith(caches.match(event.request).then(response => response || fetch(event.request)));
                    });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const workerUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(workerUrl).catch(err => console.log('SW registration failed: ', err));
            });
        }
    </script>
</body>
</html>
